apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: cert-manager
    repo: oci://quay.io/jetstack/charts
    version: v1.19.0
    releaseName: cert-manager
    valuesInline:
      global:
        leaderElection:
          namespace: cert-manager
      crds:
        enabled: true
      

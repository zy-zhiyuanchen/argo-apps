apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - db_secret.yaml

commonAnnotations:
  argocd.argoproj.io/sync-wave: "2"

helmCharts:
  - name: immich
    repo: https://immich-app.github.io/immich-charts
    version: 0.10.0
    releaseName: immich
    valuesInline:
      controllers:
        main:
          containers:
            main:
              env:
                DB_HOSTNAME:
                  valueFrom:
                    secretKeyRef:
                      name: immich-database-app
                      key: host
                DB_USERNAME:
                  valueFrom:
                    secretKeyRef:
                      name: immich-database-app
                      key: user
                DB_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: immich-database-app
                      key: password
                DB_DATABASE_NAME:
                  valueFrom:
                    secretKeyRef:
                      name: immich-database-app
                      key: dbname
      immich:
        metrics:
          enabled: false
        persistence:
          library:
            existingClaim: immich-pvc
      valkey:
        enabled: true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homarr
  namespace: argocd
spec:
  destination:
    namespace: homarr
    server: https://kubernetes.default.svc
  source:
    path: homarr-app/overlays
    repoURL: https://github.com/zy-zhiyuanchen/argo-apps.git
    targetRevision: main
  sources: []
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

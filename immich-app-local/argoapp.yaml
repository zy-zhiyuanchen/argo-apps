apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: media
  project: default
  source:
    repoURL: https://github.com/zy-zhiyuanchen/argo-apps.git
    targetRevision: main
    path: immich-app-local/overlays
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
